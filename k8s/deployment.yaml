apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-mcp
  namespace: sentinel-system
  labels:
    app: sentinel-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-mcp
  template:
    metadata:
      labels:
        app: sentinel-mcp
    spec:
      serviceAccountName: sentinel-mcp-sa
      containers:
      - name: sentinel-mcp
        image: sentinel-mcp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: watsonx-credentials
            optional: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: sentinel-mcp-config
